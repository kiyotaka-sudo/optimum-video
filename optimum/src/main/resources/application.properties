spring.application.name=optimum-video
server.port=${SERVER_PORT:9092}

spring.datasource.url=jdbc:mysql://localhost:3306/optimum_video?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

logging.file.name=Logs/optimum-video.log
logging.level.com.optimum.optimum=INFO
spring.messages.basename=messages
spring.messages.encoding=UTF-8

optimum.signature.pkcs12.path=classpath:optimum-keystore.p12
optimum.signature.pkcs12.password=optimum2026
