app.description=Optimum Vidéo est une application Spring Boot/Thymeleaf dédiée au streaming de films camerounais et africains, incluant l'accès aux chaînes de télévision du continent. Conçue pour la performance, l'interface utilise JavaScript pour garantir une lecture vidéo fluide et rapide. L'architecture repose sur une gestion réseau déportée : le serveur n'est pas hébergé sur la machine de présentation, permettant ainsi aux utilisateurs de visionner le contenu à distance depuis leur propre terminal. Enfin, l'application intègre un système d'abonnement partagé pour faciliter l'accès collectif au catalogue.

