app.description=Optimum Video is a Spring Boot/Thymeleaf application dedicated to streaming Cameroonian and African films, including access to television channels from the continent. Designed for performance, the interface uses JavaScript to ensure smooth and fast video playback. The architecture relies on remote network management: the server is not hosted on the presentation machine, allowing users to view content remotely from their own terminal. Finally, the application incorporates a shared subscription system to facilitate collective access to the catalog.

