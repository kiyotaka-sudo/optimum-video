<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnements · Optimum Video</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="page page-offset compact-page">
    <h1>Abonnements</h1>
    <div class="plans-grid">
        <article class="plan-card" th:each="plan : ${plans}">
            <h2 th:text="${plan.name}">Premium</h2>
            <p class="price"><span th:text="${plan.priceMonthly}">12.99</span> € / mois</p>
            <ul>
                <li th:each="feature : ${plan.features}" th:text="${feature}">4K</li>
                <li th:text="${plan.maxConcurrentStreams + ' écran(s) simultané(s)'}">4 écrans</li>
                <li th:text="${plan.maxProfiles + ' profils'}">6 profils</li>
            </ul>
            <button class="primary-action">Choisir</button>
            <a class="secondary-action" th:href="@{/api/subscriptions/invoices/FCT-2026-{id}/pdf(id=${plan.id})}" style="margin-top:10px;text-align:center;display:block">
                <i class="fas fa-file-pdf"></i> Télécharger facture
            </a>
        </article>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<script src="/js/app.js"></script>
</body>
</html>
