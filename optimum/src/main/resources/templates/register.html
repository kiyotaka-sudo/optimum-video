<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription · Optimum Video</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-page">
<main class="auth-shell">
    <a class="brand" href="/">Optimum<span>Video</span></a>
    <form class="auth-card" method="post" action="/register">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <h1>Créer un compte</h1>
        <div th:if="${!errors.isEmpty()}" class="form-error">
            <p th:each="error : ${errors}" th:text="${error}">Erreur</p>
        </div>
        <label>Prénom</label>
        <input name="firstName" required>
        <label>Nom</label>
        <input name="lastName" required>
        <label>Email</label>
        <input name="email" type="email" required>
        <label>Mot de passe</label>
        <input id="passwordInput" name="password" type="password" autocomplete="new-password" required>
        <div class="password-rules">
            <span data-rule="length">✓ 8 caractères minimum</span>
            <span data-rule="upper">✓ Une majuscule</span>
            <span data-rule="lower">✓ Une minuscule</span>
            <span data-rule="digit">✓ Un chiffre</span>
            <span data-rule="special">✓ Un caractère spécial</span>
        </div>
        <button class="primary-action" type="submit">S’inscrire</button>
        <a class="auth-link" href="/login">Déjà un compte ?</a>
    </form>
</main>
<script src="/js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const passwordInput = document.getElementById('passwordInput');
        const rules = {
            length: document.querySelector('[data-rule="length"]'),
            upper: document.querySelector('[data-rule="upper"]'),
            lower: document.querySelector('[data-rule="lower"]'),
            digit: document.querySelector('[data-rule="digit"]'),
            special: document.querySelector('[data-rule="special"]')
        };

        if (passwordInput) {
            passwordInput.addEventListener('input', (e) => {
                const val = e.target.value;
                
                // Length check
                if (val.length >= 8) rules.length.classList.add('valid');
                else rules.length.classList.remove('valid');
                
                // Upper case check
                if (/[A-Z]/.test(val)) rules.upper.classList.add('valid');
                else rules.upper.classList.remove('valid');
                
                // Lower case check
                if (/[a-z]/.test(val)) rules.lower.classList.add('valid');
                else rules.lower.classList.remove('valid');
                
                // Digit check
                if (/[0-9]/.test(val)) rules.digit.classList.add('valid');
                else rules.digit.classList.remove('valid');
                
                // Special character check
                if (/[^a-zA-Z0-9]/.test(val)) rules.special.classList.add('valid');
                else rules.special.classList.remove('valid');
            });
        }
    });
</script>
</body>
</html>
