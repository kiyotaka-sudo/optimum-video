<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche · Optimum Video</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="page page-offset">
    <form class="search-panel" action="/search-ui" method="get">
        <input name="q" th:value="${query}" placeholder="Film, série, documentaire...">
        <button class="primary-action" type="submit">Rechercher</button>
    </form>
    <div class="section-title">
        <h1>Catalogue</h1>
        <span th:text="${results.size() + ' résultat(s)'}">0 résultat</span>
    </div>
    <div class="catalog-grid">
        <article class="poster-card" th:each="title : ${results}">
            <a th:href="@{/titles/{id}(id=${title.id})}">
                <img th:src="${title.posterUrl}" th:alt="${title.title}">
                <strong th:text="${title.title}">Titre</strong>
                <span th:text="${title.releaseYear + ' · ' + title.type}">2026 · MOVIE</span>
            </a>
        </article>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<script src="/js/app.js"></script>
</body>
</html>
