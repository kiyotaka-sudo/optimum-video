<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ma Liste - Optimum Video</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <section class="rail">
        <div class="section-title">
            <h1>Ma Liste</h1>
        </div>
        <p class="muted">Vos titres sauvegardés pour plus tard</p>
        
        <div id="watchlistGrid" class="catalog-grid">
            <!-- Rempli par AJAX -->
            <p class="loading">Chargement de votre liste...</p>
        </div>

        <div id="emptyState" style="display: none; text-align: center; padding: 50px;">
            <p>Votre liste est vide.</p>
            <a href="/search-ui" class="primary-action" style="display:inline-block; margin-top:20px;">Parcourir le catalogue</a>
        </div>
    </section>
</main>


<div th:replace="~{fragments/layout :: footer}"></div>

<script src="/js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const grid = document.getElementById('watchlistGrid');
    const empty = document.getElementById('emptyState');

    try {
        const result = await API.get('/api/watchlist');
        const titles = result.data;

        if (!titles || titles.length === 0) {
            grid.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        grid.innerHTML = titles.map(title => `
            <article class="poster-card" id="card-${title.id}">
                <div style="position:relative">
                    <a href="/titles/${title.id}">
                        <img src="${title.posterUrl}" alt="${title.title}">
                        <strong>${title.title}</strong>
                    </a>
                    <button class="card-watchlist-btn" onclick="removeFromWatchlist('${title.id}')" 
                            style="position:absolute; top:10px; right:10px; background:rgba(229,9,20,0.8); border:none; color:white; border-radius:50%; width:30px; height:30px; cursor:pointer" title="Retirer">-</button>
                </div>
            </article>
        `).join('');
    } catch (error) {
        grid.innerHTML = `<p class="form-error">Impossible de charger la liste : ${error.message}</p>`;
    }
});

window.removeFromWatchlist = async function(titleId) {
    if (!confirm('Retirer ce titre de votre liste ?')) return;
    
    try {
        await API.delete(`/api/watchlist/${titleId}`);
        const card = document.getElementById(`card-${titleId}`);
        if (card) card.remove();
        Toast.success("Titre retiré");
        
        if (document.querySelectorAll('.poster-card').length === 0) {
            document.getElementById('watchlistGrid').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }
    } catch (error) {
        Toast.error("Erreur: " + error.message);
    }
};
</script>
</body>
</html>
